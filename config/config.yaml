# ============================================================
# GLoW Crafter — Configuration
# ============================================================

seed: 42

# --- Dimensions ---
workspace_dim: 128
latent_dims:
  vision: 256
  state: 128

# --- Crafter ---
crafter:
  num_actions: 17
  state_dim: 16       # vitals (4) + inventory (12)

# --- Encodeurs/Decodeurs ---
vision:
  input_channels: 3
  input_size: 64
  hidden_dim: 64

state:
  input_dim: 16
  hidden_dim: 64

# --- Projections ---
projection:
  hidden_dim: 256
  num_layers: 2
  dropout: 0.1

# --- Workspace ---
workspace:
  fusion: "attention"
  num_heads: 4
  num_layers: 2

# --- RSSM (World Model) ---
rssm:
  deter_dim: 256
  stoch_dim: 64
  hidden_dim: 256
  action_dim: 32

# --- Actor-Critic ---
actor_critic:
  hidden_dim: 256
  imagination_horizon: 6
  gamma: 0.997
  lambda_: 0.95
  actor_lr: 1.0e-5
  critic_lr: 1.0e-5
  entropy_weight: 1.0e-2
  target_entropy: 1.0
  entropy_lr: 1.0e-3
  alpha_min: 0.005
  reward_scale: 2.0
  actor_grad_clip: 100.0
  critic_grad_clip: 100.0

# --- Losses ---
losses:
  contrastive:
    temperature: 0.07
    weight: 1.0
  translation:
    weight: 1.0
  cycle:
    weight: 0.5
  reconstruction:
    weight: 0.2
  world_model:
    kl_weight: 1.0
    kl_balance: 0.8
    free_nats: 1.0
    workspace_recon_weight: 1.0
    reward_weight: 3.0
    continue_weight: 1.0

# --- Training ---
training:
  # Phase 0: Data collection
  collect_episodes: 200
  collect_seed: 0
  data_dir: "data/crafter_episodes"

  # Phase 1: Pre-entrainer les autoencoders
  pretrain_epochs: 20
  pretrain_lr: 1.0e-3

  # Phase 2: Alignement workspace
  align_epochs: 100
  align_lr: 5.0e-4

  # Phase 3: World model
  wm_epochs: 75
  wm_lr: 3.0e-4
  wm_seq_len: 50
  wm_batch_size: 32
  wm_max_batches: 200

  # Phase 4: Actor-critic
  ac_epochs: 100
  ac_batch_size: 32
  ac_max_batches: 200

  # Shared
  batch_size: 128
  weight_decay: 1.0e-5
  grad_clip: 1.0

  domain_pairs:
    - ["vision", "state"]

# --- Data ---
data:
  dataset: "crafter_transitions"
  num_workers: 4
  train_split: 0.8

# --- Evaluation ---
eval:
  eval_episodes: 20

# --- Logging ---
logging:
  use_wandb: false
  project: "glow-crafter"
  log_every: 50
  eval_every: 5
